name: 'RCF Guardian CI'

# [RCF:PROTECTED]
# Enforces RCF protocol compliance on every push
on:
  push:
    branches: [ main, develop, 'rc/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  compliance-check:
    name: 'RCF Integrity Audit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install rcf-cli
        run: pip install rcf-cli --quiet

      - name: Run RCF Guardian Check
        env:
          RCF_LICENSE_KEY: ${{ secrets.RCF_LICENSE_KEY }}
        run: |
          REPORT="RCF-AUDIT-REPORT.json"
          if [ ! -f "$REPORT" ]; then
            echo "::error::RCF-AUDIT-REPORT.json not found. Run 'rcf-cli audit .' locally first."
            exit 1
          fi
          
          echo "::group::RCF Integrity Verification"
          # Используем режим verify для максимальной строгости в CI
          rcf-cli verify . --verbose
          EXIT_CODE=$?
          echo "::endgroup::"
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::RCF compliance check FAILED. Protected markers were removed or files were tampered with."
            exit 1
          fi
          echo "RCF compliance check passed."