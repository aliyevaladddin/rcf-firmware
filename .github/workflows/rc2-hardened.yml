# [RCF:NOTICE][RCF:PROTECTED]
# GitHub Actions for RCF v1.3 Mil-Spec Verification.

name: RCF-CI-Verify

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-simulate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm python3

    - name: Build Firmware (RC2)
      run: |
        make clean
        make RC2 OPT="-Os" DEBUG="-g"

    - name: Run QEMU Simulation Test
      run: |
        python3 tests/qemu_verify.py .build/rcf-lume-rc2.elf

